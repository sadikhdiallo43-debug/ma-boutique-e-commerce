<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Boutique - E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .product-card {
            transition: transform 0.2s;
            height: 100%;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0;
        }
        .stock-low {
            color: #dc3545;
            font-weight: bold;
        }
        .stock-good {
            color: #28a745;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-store"></i> MaBoutique</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#boutique">Boutique</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                </ul>
                <button class="btn btn-outline-light position-relative" onclick="showCart()">
                    <i class="fas fa-shopping-cart"></i> Panier
                    <span class="cart-badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container text-center">
            <h1 class="display-4 mb-4">Bienvenue dans Notre Boutique</h1>
            <p class="lead">Découvrez nos produits de qualité avec des prix imbattables</p>
        </div>
    </section>

    <!-- Products Section -->
    <section id="boutique" class="py-5">
        <div class="container">
            <h2 class="text-center mb-5">Nos Produits</h2>
            <div class="row" id="productsContainer">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-5">Contactez-nous</h2>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-body">
                            <form id="contactForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="nom" class="form-label">Nom complet</label>
                                        <input type="text" class="form-control" id="nom" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="sujet" class="form-label">Sujet</label>
                                    <input type="text" class="form-control" id="sujet" required>
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" id="message" rows="5" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-paper-plane"></i> Envoyer le message
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Votre Panier</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="cartItems">
                        <!-- Cart items will be displayed here -->
                    </div>
                    <div class="mt-3">
                        <h4>Total: <span id="cartTotal">0</span>€</h4>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                    <button type="button" class="btn btn-success" onclick="checkout()">
                        <i class="fas fa-credit-card"></i> Valider la commande
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Finaliser la commande</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="checkoutForm">
                        <div class="mb-3">
                            <label for="clientNom" class="form-label">Nom complet</label>
                            <input type="text" class="form-control" id="clientNom" required>
                        </div>
                        <div class="mb-3">
                            <label for="clientEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="clientEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="clientTelephone" class="form-label">Téléphone</label>
                            <input type="tel" class="form-control" id="clientTelephone">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="confirmOrder()">
                        <i class="fas fa-check"></i> Confirmer la commande
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Succès!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center">
                        <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
                        <p class="mt-3" id="successMessage"></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = [];
        let products = [];

        // Formatage des prix en Francs CFA
        function formatPrice(price) {
            return new Intl.NumberFormat('fr-FR', {
                style: 'currency',
                currency: 'XOF',
                minimumFractionDigits: 0
            }).format(price);
        }

        // Load products when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });

        async function loadProducts() {
            try {
                const response = await fetch('/api/produits');
                products = await response.json();
                displayProducts();
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function displayProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';

            products.forEach(product => {
                const stockClass = product.stock <= 5 ? 'stock-low' : 'stock-good';
                const stockText = product.stock <= 5 ? `Plus que ${product.stock} en stock!` : `${product.stock} en stock`;

                const productCard = `
                    <div class="col-md-4 mb-4">
                        <div class="card product-card">
                            <img src="${product.image_url || 'https://via.placeholder.com/300x200'}" class="card-img-top" alt="${product.nom}">
                            <div class="card-body">
                                <h5 class="card-title">${product.nom}</h5>
                                <p class="card-text">${product.description || 'Description du produit'}</p>
                                <p class="card-text">
                                    <strong>${formatPrice(product.prix)}</strong><br>
                                    <small class="${stockClass}">${stockText}</small>
                                </p>
                                <button class="btn btn-primary" onclick="addToCart(${product.id})" ${product.stock === 0 ? 'disabled' : ''}>
                                    <i class="fas fa-cart-plus"></i> 
                                    ${product.stock === 0 ? 'Rupture' : 'Ajouter au panier'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += productCard;
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.stock === 0) return;

            const existingItem = cart.find(item => item.produit_id === productId);
            if (existingItem) {
                if (existingItem.quantite < product.stock) {
                    existingItem.quantite++;
                } else {
                    alert('Stock insuffisant!');
                    return;
                }
            } else {
                cart.push({
                    produit_id: productId,
                    quantite: 1,
                    prix_unitaire: product.prix
                });
            }

            updateCartDisplay();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.produit_id !== productId);
            updateCartDisplay();
        }

        function updateQuantity(productId, change) {
            const item = cart.find(item => item.produit_id === productId);
            const product = products.find(p => p.id === productId);
            
            if (item) {
                const newQuantity = item.quantite + change;
                if (newQuantity > 0 && newQuantity <= product.stock) {
                    item.quantite = newQuantity;
                } else if (newQuantity <= 0) {
                    removeFromCart(productId);
                } else {
                    alert('Stock insuffisant!');
                }
            }
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');

            const totalItems = cart.reduce((sum, item) => sum + item.quantite, 0);
            cartCount.textContent = totalItems;

            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-center">Votre panier est vide</p>';
                cartTotal.textContent = '0';
                return;
            }

            let html = '';
            let total = 0;

            cart.forEach(item => {
                const product = products.find(p => p.id === item.produit_id);
                const itemTotal = item.quantite * item.prix_unitaire;
                total += itemTotal;

                html += `
                    <div class="d-flex justify-content-between align-items-center mb-3 p-3 border rounded">
                        <div>
                            <h6>${product.nom}</h6>
                            <small>${formatPrice(item.prix_unitaire)} × ${item.quantite} = ${formatPrice(itemTotal)}</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-sm btn-outline-secondary me-2" onclick="updateQuantity(${item.produit_id}, -1)">-</button>
                            <span>${item.quantite}</span>
                            <button class="btn btn-sm btn-outline-secondary ms-2" onclick="updateQuantity(${item.produit_id}, 1)">+</button>
                            <button class="btn btn-sm btn-danger ms-3" onclick="removeFromCart(${item.produit_id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            cartItems.innerHTML = html;
            cartTotal.textContent = formatPrice(total);
        }

        function showCart() {
            const modal = new bootstrap.Modal(document.getElementById('cartModal'));
            modal.show();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Votre panier est vide!');
                return;
            }

            const cartModal = bootstrap.Modal.getInstance(document.getElementById('cartModal'));
            cartModal.hide();

            const checkoutModal = new bootstrap.Modal(document.getElementById('checkoutModal'));
            checkoutModal.show();
        }

        async function confirmOrder() {
            const nom = document.getElementById('clientNom').value;
            const email = document.getElementById('clientEmail').value;
            const telephone = document.getElementById('clientTelephone').value;

            if (!nom || !email) {
                alert('Veuillez remplir les champs obligatoires!');
                return;
            }

            try {
                const response = await fetch('/api/commandes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        client_nom: nom,
                        client_email: email,
                        client_telephone: telephone,
                        items: cart
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    cart = [];
                    updateCartDisplay();

                    const checkoutModal = bootstrap.Modal.getInstance(document.getElementById('checkoutModal'));
                    checkoutModal.hide();

                    document.getElementById('checkoutForm').reset();

                    showSuccess(`Commande #${result.commande_id} validée avec succès! Total: ${formatPrice(result.total)}`);
                } else {
                    alert('Erreur: ' + result.error);
                }
            } catch (error) {
                console.error('Error creating order:', error);
                alert('Erreur lors de la création de la commande');
            }
        }

        // Contact form handling
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const sujet = document.getElementById('sujet').value;
            const message = document.getElementById('message').value;

            try {
                const response = await fetch('/api/messages-boutique', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        client_nom: nom,
                        client_email: email,
                        sujet: sujet,
                        message: message
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    document.getElementById('contactForm').reset();
                    showSuccess('Message envoyé avec succès! Nous vous répondrons dans les plus brefs délais.');
                } else {
                    alert('Erreur: ' + result.error);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Erreur lors de l\'envoi du message');
            }
        });

        function showSuccess(message) {
            document.getElementById('successMessage').textContent = message;
            const modal = new bootstrap.Modal(document.getElementById('successModal'));
            modal.show();
        }
    </script>
</body>
</html>
